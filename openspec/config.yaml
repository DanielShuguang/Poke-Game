schema: spec-driven

context: |
  技术栈：Flutter 3.x, Dart SDK ^3.6.1
  UI框架：Material Design 3 (Material You)
  目标平台：Android, iOS, Web, Windows, macOS, Linux
  架构模式：Clean Architecture（domain/data/presentation 三层）
  状态管理：flutter_riverpod（StateNotifierProvider + ConsumerStatefulWidget）
  路由：GoRouter（声明式路由，/game、/room/scan、/room/create、/room/lobby）
  领域：扑克游戏合集移动应用

  已上线游戏（全部支持单机 AI + 局域网联机）：
  - 斗地主（/doudizhu）：3人，叫地主/出牌/判胜负，MCTS AI
  - 德州扑克（/texas-holdem）：2-9人现金局
  - 炸金花（/zhajinhua）：2-6人，三张牌博弈
  - 21点（/blackjack）：1-7人，Hard 17规则
  - 斗牛（/niuniu）：2-6人，C(5,3)判牛，倍率结算
  - 升级（/shengji）：4人两队，叫主/出牌/升级
  - 跑得快（/paodekai）：3人竞速出牌，倒计时超时自动托管
  - 掼蛋（/guandan）：4人两队（两副牌），MCTS AI，进贡/还贡，倒计时

  通用 AI 引擎：
  - MCTS 引擎（lib/core/ai/mcts/）：mcts_engine、mcts_node、mcts_game_state
  - 斗地主和掼蛋通过适配层（doudizhu_mcts_state/guandan_mcts_state）接入 MCTS

  局域网联机架构（Host/Client 适配器模式）：
  - 每款游戏有对应 XxxNetworkAdapter（lib/core/network/）
  - 构造参数：incomingStream, broadcastFn, notifier, isHost, localPlayerId, turnTimeLimit
  - Host 执行行动 → 广播状态；Client 发送行动 → 等待同步
  - showdown 前 toJson(includeAllCards: false) 隐藏他人手牌
  - 可配置超时（默认35秒，由turnTimeLimit参数控制）→ Host 代为执行最小操作
  - 创建房间时可选回合时限（15/25/35/60秒），存入 Room.gameConfig['turnTimeLimit']
  - game_navigation_helper.dart 中 navigateToGame() 从 gameConfig 读取时限并传递

  新增游戏必改文件（共7处）：
  1. domain/lan/entities/room_info.dart（GameType枚举 + switch分支）
  2. domain/lan/entities/room_info.g.dart / room.g.dart（序列化映射）
  3. core/router/app_router.dart（路由注册）
  4. presentation/pages/home/home_provider.dart（游戏卡片）
  5. presentation/pages/home/home_page.dart（_supportsOnline列表）
  6. presentation/pages/room/game_navigation_helper.dart（navigateToGame switch）
  7. presentation/pages/room/game_rules_page.dart（_getRulesContent switch）

  UI规范：
  - 退出按钮统一：左上角 IconButton(Icons.arrow_back, white70) + 确认弹窗 + Navigator.pop
  - 横屏游戏：initState 锁定横屏，dispose 时恢复

  代码规范：  
  - 单个文件不超过 500 行；超出时应拆分为多个职责单一的文件
  - 单个方法/函数不超过 100 行；超出时应提取为私有辅助方法

rules:
  proposal:
    - 明确游戏规则和牌型定义（数据结构、胜负判定、倍率计算）
    - 说明单机 AI 策略要点
    - 说明联机行动消息格式（参考 XxxNetworkAction 模式）
    - 包含 UI/UX 设计要点（横屏布局、动画时序）
  tasks:
    - 每个任务应可独立测试，优先实现核心游戏逻辑
    - 分层顺序：entities → usecases → AI → notifier → 网络适配器 → UI → 路由接入
    - 单元测试覆盖引擎核心逻辑（判牌、结算）和 AI 下注范围
    - UI 实现应考虑多平台横屏适配
  spec:
    - 明确卡牌数据结构和点值计算规则
    - 定义游戏状态机（阶段枚举 + 合法转换）
    - 说明手牌隐私策略（toJson includeAllCards 参数）
    - 说明动画时序和交互细节
